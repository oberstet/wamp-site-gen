name: Publishing new site

on: [repository_dispatch]

permissions:
  contents: write

jobs:
  deploy-to-gh-pages:
    name: Deploy spec site to github pages
    if: github.event.action == 'publish'
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      # Checkout THIS repo (wamp-site-gen) - provides the favicons overlaid onto
      # the published site below.
      - uses: actions/checkout@v5

      # Checkout the spec+website SOURCE (wamp-proto). This is a PUBLIC repo, so a
      # plain checkout clones it with the ambient token - no deploy key needed. The
      # former `ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}` has been dropped (that
      # 4-year-old deploy-key secret can now be deleted).
      - uses: actions/checkout@v5
        with:
          repository: wamp-proto/wamp-proto
          path: wamp-proto

      # The spec+website build was migrated from `make` to `just`+`uv` in
      # wamp-proto#553; the steps below mirror the proven-green PR workflow
      # `wamp-proto/.github/workflows/build-and-test.yml` (and the wamp-proto#568
      # deploy fix) so the publish path uses the same toolchain. Previously this job
      # ran `make build` on the wamp-proto checkout, but that target was removed by
      # the migration -> every dispatched publish failed (wamp-site-gen#3).
      - name: Set Environment Variables
        run: |
          echo "PATH=$HOME/.local/bin/:$PATH" >> $GITHUB_ENV
          echo "PATH=$HOME/.cargo/bin/:$PATH" >> $GITHUB_ENV
          echo "WAMP_BUILD_ID=$(date -u "+%Y%m%d")-$(git -C wamp-proto rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Install OS Packages
        run: |
          sudo apt update
          sudo apt install -y libcairo2-dev libenchant-2-2 libharfbuzz0b libpango1.0-dev libpangoft2-1.0-0 libxml2-utils
          sudo apt install -y enscript mmark weasyprint
          # imagemagick provides `convert`, used by `just optimize-images` to
          # generate docs/_static/img/favicon.ico from favicon.svg
          sudo apt install -y imagemagick

      - name: Setup Toolchain I (Just, UV)
        run: |
          # Install Just direct-from-upstream (see: https://just.systems/man/en/pre-built-binaries.html)
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --tag 1.42.3 --force --to $HOME/.local/bin/
          which just
          just --version

          # Install UV direct-from-upstream (see: https://docs.astral.sh/uv/getting-started/installation/#standalone-installer)
          curl -LsSf https://astral.sh/uv/install.sh | sh
          which uv
          uv --version

      - name: Setup Toolchain II (Python venv, Python dependencies)
        working-directory: ./wamp-proto
        run: |
          # Use Just to set up the Python venv, then install Python dependencies
          just create
          just install

      - name: Build Spec and Website
        working-directory: ./wamp-proto
        run: |
          # build Sphinx-based website; build spec (RFC) in HTML, TXT and PDF -> ./dist
          just build

      - run: mv ./wamp-proto/dist/_graphics ./wamp-proto/dist/graphics
      - run: mv ./wamp-proto/dist/_images ./wamp-proto/dist/images
      - run: mv ./wamp-proto/dist/_sources ./wamp-proto/dist/sources
      - run: mv ./wamp-proto/dist/_static ./wamp-proto/dist/static
      - name: Rename underscore urls in dist
        run: find ./wamp-proto/dist -type f \( -name "*.html" -or -name "*.txt" \) -print -exec sed -i 's/_graphics\//graphics\//g' {} \;
      - run: find ./wamp-proto/dist -type f \( -name "*.html" -or -name "*.txt" \) -print -exec sed -i 's/_images\//images\//g' {} \;
      - run: find ./wamp-proto/dist -type f \( -name "*.html" -or -name "*.txt" \) -print -exec sed -i 's/_sources\//sources\//g' {} \;
      - run: find ./wamp-proto/dist -type f \( -name "*.html" -or -name "*.txt" \) -print -exec sed -i 's/_static\//static\//g' {} \;
      - run: rm -rf dist
      - run: cp -r wamp-proto/dist ./
      - run: cp -r favicons/* dist/
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: dist     # The folder the action should deploy.
